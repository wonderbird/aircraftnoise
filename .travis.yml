sudo: required
language: java
jdk:
- oraclejdk8
addons:
  apt:
    packages:
    - oracle-java8-installer
services:
- docker
env:
  global:
  - PATH=$PATH:${HOME}/google-cloud-sdk/bin
  - CLOUDSDK_CORE_DISABLE_PROMPTS=1
  - CLOUD_SDK_REPO="cloud-sdk-$(lsb_release -c -s)"
  - GOOGLE_APPLICATION_CREDENTIALS=${HOME}/client-secret.json
  - secure: 
before_script: npm install
script: mvn clean verify && npm run test-phantomjs
before_install:
- echo ${CLOUD_SDK_REPO}
- sudo apt-get -qq update
- echo "deb http://packages.cloud.google.com/apt $CLOUD_SDK_REPO main" | sudo tee
  -a /etc/apt/sources.list.d/google-cloud-sdk.list
- curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key add -
- sudo apt-get update -qq
- sudo apt-get install google-cloud-sdk -y
- sudo apt-get install kubectl -y
- openssl aes-256-cbc -K $encrypted_72f876c3e1a5_key -iv $encrypted_72f876c3e1a5_iv
  -in scripts/credentials.tar.gz.enc -out scripts/credentials.tar.gz -d
- tar -xzf scripts/credentials.tar.gz
- mkdir -p lib
- gcloud auth activate-service-account --key-file client-secret.json
install:
- gcloud config set compute/zone europe-west1-b
- gcloud config set project aircraftnoise100
- gcloud config list
- gcloud container clusters get-credentials aircraft-noise-cluster
deploy:
  skip_cleanup: true
  provider: script
  script: scripts/deploy
  on:
    branch: master
