sudo: required
language: java
jdk:
- oraclejdk8

addons:
  apt:
    packages:
    - oracle-java8-installer

services:
  - docker

#cache:
#  directories:
#  - "$HOME/google-cloud-sdk/"

env:
- PATH=$PATH:${HOME}/google-cloud-sdk/bin CLOUDSDK_CORE_DISABLE_PROMPTS=1 CLOUD_SDK_REPO="cloud-sdk-$(lsb_release -c -s)" GOOGLE_APPLICATION_CREDENTIALS=${HOME}/client-secret.json

before_install:
# Install Google Cloud SDK
# See also:
# - https://cloud.google.com/sdk/downloads#apt-get
# - https://docs.travis-ci.com/user/installing-dependencies/
- echo ${CLOUD_SDK_REPO}
- sudo apt-get -qq update
- echo "deb http://packages.cloud.google.com/apt $CLOUD_SDK_REPO main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
- curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key add -
- sudo apt-get update -qq
- sudo apt-get install google-cloud-sdk -y
- sudo apt-get install kubectl -y
# Authorize with Google Cloud using the API key
# See also:
# - Section "Creating Credentials" in https://cloud.google.com/solutions/continuous-delivery-with-travis-ci
- openssl aes-256-cbc -K $encrypted_72f876c3e1a5_key -iv $encrypted_72f876c3e1a5_iv
  -in gcloud/credentials.tar.gz.enc -out gcloud/credentials.tar.gz -d
- tar -xzf gcloud/credentials.tar.gz
- mkdir -p lib
- gcloud auth activate-service-account --key-file client-secret.json
# Get login data for kubectl
# See also:
# - http://thylong.com/ci/2016/deploying-from-travis-to-gce/ and associated GitHub repository
- gcloud container clusters get-credentials aircraftnoise100
- gcloud version
- kubectl version

install:
- gcloud config set project aircraftnoise100

deploy:
  skip_cleanup: true
  provider: script
  script: gcloud/deploy
  on:
    branch: master
